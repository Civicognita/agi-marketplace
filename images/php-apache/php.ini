; Aionima PHP configuration — sensible defaults for development and production.
; Stacks can override via additional .ini files or environment variables.

[PHP]
; Error handling — safe defaults, overridable per-project
display_errors = Off
log_errors = On
error_reporting = E_ALL

; Limits — generous for modern PHP apps
memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 72M
max_execution_time = 120
max_input_time = 60
max_input_vars = 5000

; OPcache — enabled by default for performance
[opcache]
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; Session
[Session]
session.cookie_httponly = 1
session.cookie_secure = 0
session.use_strict_mode = 1

; Date — default UTC, overridable via APP_TIMEZONE
[Date]
date.timezone = UTC
